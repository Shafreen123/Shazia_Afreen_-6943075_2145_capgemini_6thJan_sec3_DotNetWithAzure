<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — TransactApp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-dashboard">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <span class="sidebar-logo">TA</span>
      <span class="sidebar-name">TransactApp</span>
    </div>
    <nav class="sidebar-nav">
      <a href="#" class="nav-item active">
        <svg viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
        Overview
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><path d="M3 10h14M3 6h14M3 14h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Transactions
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        History
      </a>
      <a href="#" class="nav-item">
        <svg viewBox="0 0 20 20" fill="none"><circle cx="10" cy="7" r="3" stroke="currentColor" stroke-width="1.5"/><path d="M3 17c0-3.314 3.134-6 7-6s7 2.686 7 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        Profile
      </a>
    </nav>
    <button class="sidebar-logout" id="logoutBtn">
      <svg viewBox="0 0 20 20" fill="none"><path d="M13 10H3m0 0 3-3m-3 3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 4h5a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1h-5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      Sign out
    </button>
  </aside>

  <div class="main-wrapper">
    <header class="topbar">
      <div class="topbar-left">
        <h2 class="page-title">Overview</h2>
        <span class="page-date" id="pageDate"></span>
      </div>
      <div class="topbar-right">
        <div class="user-chip">
          <div class="user-avatar" id="userAvatar">U</div>
          <span id="userNameDisplay">User</span>
        </div>
      </div>
    </header>

    <main class="dashboard-body">
      <div id="errorState" class="error-banner hidden" role="alert"></div>

      <section class="summary-grid">
        <div class="summary-card skeleton" id="cardTotal">
          <div class="card-icon card-icon-total">
            <svg viewBox="0 0 20 20" fill="none"><path d="M3 6a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6Z" stroke="currentColor" stroke-width="1.5"/><path d="M3 9h14" stroke="currentColor" stroke-width="1.5"/></svg>
          </div>
          <div class="card-body">
            <p class="card-label">Total Transactions</p>
            <p class="card-value" id="totalCount">—</p>
          </div>
        </div>
        <div class="summary-card skeleton" id="cardCredits">
          <div class="card-icon card-icon-credit">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 14V6m0 0-3 3m3-3 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="card-body">
            <p class="card-label">Total Credits</p>
            <p class="card-value card-value-credit" id="totalCredits">—</p>
          </div>
        </div>
        <div class="summary-card skeleton" id="cardDebits">
          <div class="card-icon card-icon-debit">
            <svg viewBox="0 0 20 20" fill="none"><path d="M10 6v8m0 0-3-3m3 3 3-3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="card-body">
            <p class="card-label">Total Debits</p>
            <p class="card-value card-value-debit" id="totalDebits">—</p>
          </div>
        </div>
        <div class="summary-card skeleton" id="cardNet">
          <div class="card-icon card-icon-net">
            <svg viewBox="0 0 20 20" fill="none"><path d="M4 10h12M10 4l6 6-6 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <div class="card-body">
            <p class="card-label">Net Balance</p>
            <p class="card-value" id="netBalance">—</p>
          </div>
        </div>
      </section>

      <section class="table-section">
        <div class="table-header">
          <h3 class="table-title">Recent Transactions</h3>
          <div class="table-filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="credit">Credits</button>
            <button class="filter-btn" data-filter="debit">Debits</button>
          </div>
        </div>
        <div id="loadingState" class="loading-state">
          <div class="loading-spinner"></div>
          <p>Loading transactions…</p>
        </div>
        <div class="table-wrap hidden" id="tableWrap">
          <table id="txTable">
            <thead>
              <tr>
                <th>Date</th>
                <th>Description</th>
                <th>Type</th>
                <th class="col-right">Amount</th>
              </tr>
            </thead>
            <tbody id="txBody"></tbody>
          </table>
        </div>
        <div id="emptyState" class="empty-state hidden">
          <svg viewBox="0 0 48 48" fill="none"><rect x="8" y="12" width="32" height="28" rx="3" stroke="currentColor" stroke-width="2"/><path d="M16 20h16M16 26h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <p>No transactions found</p>
        </div>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('pageDate').textContent = new Date().toLocaleDateString('en-IN', {
      weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
    });

    let allTransactions = [];

    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const filter = btn.dataset.filter;
        const filtered = filter === 'all'
          ? allTransactions
          : allTransactions.filter(t => t.type.toLowerCase() === filter);
        renderTable(filtered);
      });
    });

    window._storeTransactions = (txs) => {
      allTransactions = txs;
      updateSummaryCards(txs);
    };

    function updateSummaryCards(txs) {
      document.querySelectorAll('.summary-card').forEach(c => c.classList.remove('skeleton'));
      const credits = txs.filter(t => t.type.toLowerCase() === 'credit');
      const debits  = txs.filter(t => t.type.toLowerCase() === 'debit');
      const totalCr = credits.reduce((s, t) => s + t.amount, 0);
      const totalDb = debits.reduce((s, t) => s + t.amount, 0);
      const net = totalCr - totalDb;

      document.getElementById('totalCount').textContent   = txs.length;
      document.getElementById('totalCredits').textContent = '₹' + totalCr.toLocaleString('en-IN', {minimumFractionDigits:2});
      document.getElementById('totalDebits').textContent  = '₹' + totalDb.toLocaleString('en-IN', {minimumFractionDigits:2});
      const netEl = document.getElementById('netBalance');
      netEl.textContent = (net >= 0 ? '+' : '') + '₹' + Math.abs(net).toLocaleString('en-IN', {minimumFractionDigits:2});
      netEl.style.color = net >= 0 ? 'var(--green)' : 'var(--red)';

      try {
        const jwt = localStorage.getItem('jwt');
        if (jwt) {
          const payload = JSON.parse(atob(jwt.split('.')[1]));
          const name = payload['http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name'] || payload.name || 'User';
          document.getElementById('userNameDisplay').textContent = name;
          document.getElementById('userAvatar').textContent = name[0].toUpperCase();
        }
      } catch(e) {}
    }
  </script>
</body>
</html>
