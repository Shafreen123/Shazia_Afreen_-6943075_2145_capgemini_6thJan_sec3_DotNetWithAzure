<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Courses</title>
    <style>
        :root { --bg-gradient-start: #0f172a; --bg-gradient-end: #1e3a8a; --card: rgba(255,255,255,0.9); --text: #0f172a; --primary: #3b82f6; --success: #10b981; --disabled: #6b7280; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; background: linear-gradient(145deg, var(--bg-gradient-start), var(--bg-gradient-end)); font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: #111827; padding: 24px 20px; }
        nav { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 18px; }
        nav h1 { margin: 0; color: #f8fafc; font-size: 1.7rem; letter-spacing: .2px; }
        #nav-links a { margin-right: 14px; color: #e0e7ff; text-decoration: none; font-weight: 600; padding: 6px 10px; border-radius: 8px; background: rgba(15, 23, 42, 0.5); transition: background .2s; }
        #nav-links a:hover { background: rgba(99, 102, 241, 0.8); }
        .badge { color: white; border-radius: 999px; padding: 8px 12px; font-size: 0.82rem; background: rgba(15,23,42,0.75); }
        .badge-instructor { background: #7c3aed; }
        .badge-student { background: #f97316; }
        h2 { margin-top: 0; color: #f8fafc; text-shadow: 0 1px 8px rgba(0,0,0,0.4); }
        .course-card, .enrolled-card { background: var(--card); border-radius: 16px; border: 1px solid rgba(15,23,42,0.2); box-shadow: 0 12px 25px rgba(0, 0, 0, 0.18); padding: 16px; margin: 10px 0; }
        .course-card h3, .enrolled-card h3 { margin: 0 0 8px; color: #1e40af; }
        .lesson-count { color: #475569; font-size: .94rem; margin: 4px 0; }
        .lessons-list { margin-top: 8px; padding-left: 16px; color: #334155; font-size: 0.9rem; list-style-type: square; }
        .btn { cursor: pointer; border: 0; border-radius: 10px; padding: 8px 14px; font-weight: 600; color: white; transition: transform .15s, filter .15s; }
        .btn:hover{ transform: translateY(-1px); filter: brightness(1.08); }
        .btn-primary { background: var(--primary); }
        .btn-success { background: var(--success); }
        .btn-enrolled { background: var(--disabled); cursor: not-allowed; }
        .btn-purple { background: #7c3aed; }
        .btn-small { font-size: 0.86rem; padding: 6px 10px; }
        .add-lesson-form { margin-top: 10px; display: flex; gap: 8px; }
        .add-lesson-form input { flex: 1; padding: 8px 10px; border: 1px solid rgba(100,116,139,0.35); border-radius: 8px; }
        .section-title { margin: 28px 0 10px; color: #f8fafc; border-bottom: 2px solid rgba(193, 221, 248, 0.4); padding-bottom: 6px; }
        .message { font-size: 0.9rem; margin-top: 6px; min-height: 18px; }
    </style>
</head>
<body>
<nav>
    <div id="nav-links"></div>
    <span id="role-badge"></span>
</nav>

<h2>All Courses</h2>
<div id="courses-list">Loading...</div>

<div id="enrolled-section" style="display:none">
    <h2 class="section-title">My Enrolled Courses</h2>
    <div id="enrolled-list">Loading...</div>
</div>

<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    function parseToken(t) {
        try { return JSON.parse(atob(t.split(".")[1])); } catch { return {}; }
    }

    const payload = parseToken(token);
    const role = payload["http://schemas.microsoft.com/ws/2008/06/identity/claims/role"] || "Unknown";
    const userId = parseInt(payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"] || "0");
    const username = payload["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name"] || "User";

    const badge = document.getElementById("role-badge");
    badge.textContent = username + " (" + role + ")";
    badge.className = "badge badge-" + role.toLowerCase();

    const navLinks = document.getElementById("nav-links");
    if (role === "Instructor" || role === "Admin") {
        navLinks.innerHTML = '<a href="courses.html">Courses</a><a href="create-course.html">Create Course</a><a href="#" onclick="logout()">Logout</a>';
    } else {
        navLinks.innerHTML = '<a href="courses.html">Courses</a><a href="#" onclick="logout()">Logout</a>';
    }

    let enrolledCourseIds = [];
    let allCourses = [];

    async function loadEnrollments() {
        try {
            const res = await fetch("/api/v1/enrollments/" + userId, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (res.ok) {
                const data = await res.json();
                enrolledCourseIds = data.map(e => e.courseId);
            }
        } catch {}
    }

    async function loadCourses() {
        await loadEnrollments();
        const res = await fetch("/api/v1/courses", {
            headers: { "Authorization": "Bearer " + token }
        });
        if (res.status === 401) { window.location.href = "login.html"; return; }
        allCourses = await res.json();
        renderCourses();
        if (role === "Student") showEnrolledCourses();
    }

    function renderCourses() {
        const container = document.getElementById("courses-list");
        if (allCourses.length === 0) { container.innerHTML = "<p>No courses yet.</p>"; return; }

        let html = "";
        for (const c of allCourses) {
            html += "<div class='course-card' id='card-" + c.id + "'>";
            html += "<h3>" + c.title + "</h3>";
            html += "<p class='lesson-count'>Lessons: " + c.lessons.length + "</p>";

            if (c.lessons.length > 0) {
                html += "<ul class='lessons-list'>";
                for (const l of c.lessons) {
                    html += "<li>📖 " + l.name + "</li>";
                }
                html += "</ul>";
            }

            if (role === "Instructor" || role === "Admin") {
                html += "<div class='add-lesson-form'>";
                html += "<input type='text' id='lesson-" + c.id + "' placeholder='New lesson name' />";
                html += "<button class='btn btn-purple btn-small' onclick='addLesson(" + c.id + ")'>+ Add Lesson</button>";
                html += "</div>";
                html += "<p id='lesson-msg-" + c.id + "' style='color:green;font-size:13px;'></p>";
            } else if (role === "Student") {
                if (enrolledCourseIds.includes(c.id)) {
                    html += "<button class='btn btn-enrolled' disabled>Enrolled</button>";
                } else {
                    html += "<button class='btn' onclick='enroll(" + c.id + ", this)'>Enroll</button>";
                }
            }

            html += "</div>";
        }
        container.innerHTML = html;
    }

    async function addLesson(courseId) {
        const input = document.getElementById("lesson-" + courseId);
        const msg = document.getElementById("lesson-msg-" + courseId);
        const name = input.value.trim();

        if (!name) { msg.style.color = "red"; msg.textContent = "Lesson name is required"; return; }

        const res = await fetch("/api/v1/courses/" + courseId + "/lessons", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ name: name })
        });
        const data = await res.json();
        if (res.ok) {
            msg.style.color = "green";
            msg.textContent = "Lesson added!";
            input.value = "";
            const course = allCourses.find(c => c.id === courseId);
            if (course) course.lessons.push(data);
            renderCourses();
        } else {
            msg.style.color = "red";
            msg.textContent = data.error || "Failed to add lesson";
        }
    }

    function showEnrolledCourses() {
        const section = document.getElementById("enrolled-section");
        const list = document.getElementById("enrolled-list");
        section.style.display = "block";

        const enrolled = allCourses.filter(c => enrolledCourseIds.includes(c.id));
        if (enrolled.length === 0) { list.innerHTML = "<p>You have not enrolled in any courses yet.</p>"; return; }

        let html = "";
        for (const c of enrolled) {
            html += "<div class='enrolled-card'>";
            html += "<h3>" + c.title + "</h3>";
            html += "<p class='lesson-count'>Lessons: " + c.lessons.length + "</p>";
            if (c.lessons.length > 0) {
                html += "<ul class='lessons-list'>";
                for (const l of c.lessons) {
                    html += "<li>📖 " + l.name + "</li>";
                }
                html += "</ul>";
            }
            html += "</div>";
        }
        list.innerHTML = html;
    }

    async function enroll(courseId, btn) {
        const res = await fetch("/api/v1/enroll", {
            method: "POST",
            headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
            body: JSON.stringify({ userId: userId, courseId: courseId })
        });
        const data = await res.json();
        if (data.message) {
            btn.textContent = "Enrolled";
            btn.className = "btn btn-enrolled";
            btn.disabled = true;
            enrolledCourseIds.push(courseId);
            showEnrolledCourses();
        } else {
            alert(data.error || "Failed to enroll");
        }
    }

    function logout() {
        localStorage.removeItem("token");
        window.location.href = "login.html";
    }

    loadCourses();
</script>
</body>
</html>
