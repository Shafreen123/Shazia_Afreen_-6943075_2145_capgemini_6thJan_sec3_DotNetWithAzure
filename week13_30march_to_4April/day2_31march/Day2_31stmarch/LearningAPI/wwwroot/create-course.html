<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Course</title>
    <style>
        :root { --bg-start: #e0e7ff; --bg-end: #312e81; --card: rgba(255,255,255,0.96); --accent: #2563eb; --text: #0f172a; }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(140deg, var(--bg-start), var(--bg-end)); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: var(--text); padding: 20px; }
        .card { width: min(430px, 100%); padding: 2.1rem 1.8rem; border-radius: 16px; background: var(--card); border: 1px solid rgba(99,102,241,0.2); box-shadow: 0 20px 40px rgba(0,0,0,0.18); }
        nav { text-align: center; margin-bottom: 12px; }
        nav a { text-decoration: none; color: var(--accent); font-weight: 700; padding: 6px 10px; border-radius: 8px; background: rgba(37, 99, 235, 0.12); transition: background .2s; }
        nav a:hover { background: rgba(37, 99, 235, 0.22); }
        h2 { text-align: center; margin: 0 0 16px; font-size: 1.85rem; }
        input { width: 100%; padding: 12px 14px; border: 1px solid rgba(100,116,139,0.3); border-radius: 10px; margin: 8px 0; background: rgba(243,244,246,0.95); transition: border-color .2s, box-shadow .2s; }
        input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2); }
        button { width: 100%; padding: 12px; border: none; border-radius: 10px; background: linear-gradient(95deg, #2563eb, #9333ea); color: white; font-weight: 700; cursor: pointer; transition: transform .2s, filter .2s; }
        button:hover { transform: translateY(-1px); filter: brightness(1.07); }
        .error { color: #dc2626; font-size: .9rem; min-height: 18px; margin: 6px 0; }
        .success { color: #16a34a; font-size: .9rem; min-height: 18px; margin: 6px 0; }
    </style>
</head>
<body>
<div class="card">
    <nav>
        <a href="courses.html">Back to Courses</a>
    </nav>
    <h2>Create Course</h2>
    <input type="text" id="title" placeholder="Course Title" />
    <p class="error" id="error"></p>
    <p class="success" id="success"></p>
    <button onclick="createCourse()">Create Course</button>
</div>
<script>
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "login.html";

    async function createCourse() {
        const title = document.getElementById("title").value.trim();
        const errorEl = document.getElementById("error");
        const successEl = document.getElementById("success");

        errorEl.textContent = "";
        successEl.textContent = "";

        if (!title) { errorEl.textContent = "Title is required"; return; }

        try {
            const res = await fetch("/api/v1/courses", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({ title })
            });
            const data = await res.json();
            if (!res.ok) { errorEl.textContent = data.error || "Failed to create course"; return; }
            successEl.textContent = "Course created! Redirecting...";
            setTimeout(() => window.location.href = "courses.html", 1500);
        } catch {
            errorEl.textContent = "Server error. Try again.";
        }
    }
</script>
</body>
</html>
