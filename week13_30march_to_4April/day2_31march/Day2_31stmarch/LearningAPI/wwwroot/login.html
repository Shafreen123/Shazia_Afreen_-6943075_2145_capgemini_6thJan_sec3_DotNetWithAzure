<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        :root {
            --bg-start: #4e54c8;
            --bg-end: #8f94fb;
            --card-bg: rgba(255,255,255,0.95);
            --accent: #ff6f61;
            --accent-2: #5372f0;
            --text: #1f2937;
            --text-muted: #64748b;
            --btn: #374151;
        }
        * { box-sizing: border-box; }
        body { margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center; background: linear-gradient(135deg, var(--bg-start), var(--bg-end)); font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif; color: var(--text); }
        .card { width: min(380px, 90vw); backdrop-filter: blur(12px); background: var(--card-bg); border-radius: 18px; padding: 2.2rem 2rem; box-shadow: 0 20px 40px rgba(15, 23, 42, 0.35); border: 1px solid rgba(255,255,255,0.4); }
        h2 { text-align: center; margin: 0 0 18px; font-size: 1.8rem; color: white; text-shadow: 0 2px 15px rgba(0,0,0,0.25); }
        input { width: 100%; padding: 12px 14px; margin: 10px 0; border: 1px solid rgba(100,116,139,0.3); border-radius: 10px; background: rgba(243,244,246,0.92); transition: transform .2s, border-color .2s; }
        input:focus { border-color: var(--accent-2); transform: translateY(-1px); outline: none; }
        button { width: 100%; margin-top: 14px; padding: 12px; border-radius: 10px; border: none; background: linear-gradient(90deg, var(--accent), var(--accent-2)); color: white; font-weight: 700; cursor: pointer; letter-spacing: .3px; transition: filter .2s, transform .2s; }
        button:hover { filter: brightness(1.05); transform: translateY(-1px); }
        .error { color: #ef4444; font-size: 13px; min-height: 18px; margin-top: 5px; }
        a { display: block; text-align: center; margin-top: 14px; color: white; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>
<div class="card">
    <h2>Login</h2>
    <input type="text" id="username" placeholder="Username" />
    <input type="password" id="password" placeholder="Password" />
    <p class="error" id="error"></p>
    <button onclick="login()">Login</button>
    <a href="register.html">No account? Register</a>
</div>
<script>
    async function login() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value.trim();
        const errorEl = document.getElementById("error");

        if (!username) { errorEl.textContent = "Username is required"; return; }
        if (!password) { errorEl.textContent = "Password is required"; return; }

        try {
            const res = await fetch("/api/auth/login", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            if (!res.ok) { errorEl.textContent = data.error || "Login failed"; return; }
            localStorage.setItem("token", data.token);
            window.location.href = "courses.html";
        } catch {
            errorEl.textContent = "Server error. Try again.";
        }
    }
</script>
</body>
</html>
