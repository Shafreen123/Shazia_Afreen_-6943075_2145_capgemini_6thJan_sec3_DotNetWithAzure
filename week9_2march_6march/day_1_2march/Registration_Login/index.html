<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register & Login</title>

<style>

body{
    margin:0;
    font-family:Arial;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.card{
    background:white;
    padding:30px;
    width:300px;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
}

label{
    font-weight:bold;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

input:focus{
    border-color:#667eea;
    outline:none;
}

button{
    width:100%;
    padding:10px;
    border:none;
    border-radius:6px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#5563d1;
}

/* Hide login form first */

#loginForm{
    display:none;
}

</style>
</head>

<body>

<div class="card">

<!-- Registration Form -->

<div id="registerForm">
<h2>Register</h2>

<label>Username</label>
<input type="text" id="regUser">

<label>Email</label>
<input type="email" id="regEmail">

<label>Password</label>
<input type="password" id="regPass">

<button onclick="register()">Register</button>

</div>

<!-- Login Form -->

<div id="loginForm">
<h2>Login</h2>

<label>Email</label>
<input type="email" id="loginEmail">

<label>Password</label>
<input type="password" id="loginPass">

<button onclick="login()">Login</button>

</div>

</div>

<script>

let savedEmail = "";
let savedPassword = "";

function register(){

savedEmail = document.getElementById("regEmail").value;
savedPassword = document.getElementById("regPass").value;

alert("Registration successful! Please login.");

document.getElementById("registerForm").style.display="none";
document.getElementById("loginForm").style.display="block";

}

function login(){

let email = document.getElementById("loginEmail").value;
let pass = document.getElementById("loginPass").value;

if(email === savedEmail && pass === savedPassword){
alert("Login Successful!");
}
else{
alert("Invalid Email or Password");
}

}

</script>

</body>
</html>
