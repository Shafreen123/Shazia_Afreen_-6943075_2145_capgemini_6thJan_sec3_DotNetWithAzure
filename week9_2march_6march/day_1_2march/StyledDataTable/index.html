<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Grades Table</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: #f4f6f9;
    padding: 40px;
}

table{
    width: 70%;
    margin: auto;
    border-collapse: collapse;
    background: white;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

caption{
    font-size: 24px;
    font-weight: bold;
    margin-bottom: 10px;
    padding: 10px;
}

th, td{
    border: 1px solid #ddd;
    padding: 12px;
    text-align: center;
}

th{
    background-color: #4CAF50;
    color: white;
}

/* Alternate Row Colors */
tr:nth-child(even){
    background-color: #f2f2f2;
}

/* Hover Effect */
tr:hover{
    background-color: #d6f5d6;
    cursor: pointer;
}

</style>
</head>

<body>

<table>

<caption>Student Grades Report</caption>

<tr>
<th>Student ID</th>
<th>Name</th>
<th>Subject</th>
<th>Marks</th>
<th>Grade</th>
</tr>

<tr>
<td>101</td>
<td>Aisha</td>
<td>Mathematics</td>
<td>92</td>
<td>A</td>
</tr>

<tr>
<td>102</td>
<td>Rahul</td>
<td>Science</td>
<td>85</td>
<td>B</td>
</tr>

<tr>
<td>103</td>
<td>Priya</td>
<td>English</td>
<td>88</td>
<td>B+</td>
</tr>

<tr>
<td>104</td>
<td>Arjun</td>
<td>Computer</td>
<td>95</td>
<td>A+</td>
</tr>

<tr>
<td>105</td>
<td>Sneha</td>
<td>History</td>
<td>78</td>
<td>C+</td>
</tr>

</table>

</body>
</html>
